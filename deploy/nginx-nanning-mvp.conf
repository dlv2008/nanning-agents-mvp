# ==========================================================
# 国能南宁 AI 智能体平台 - 独立 Nginx 配置文件
# 说明：此文件为侧挂式配置，需被主域名的 server{} 块 include。
# 部署：将此文件内容追加/include 进 /etc/nginx/sites-enabled/meet.conf
#       的主 server 块中（监听 443 的那个块），在其末尾 } 之前插入：
#       include /etc/nginx/conf.d/nanning-mvp.conf;
# ==========================================================

# 兼容不带尾部斜杠的访问，永久重定向到带斜杠的地址
location = /nanning_agents_mvp {
    return 308 /nanning_agents_mvp/;
}

# 主代理：将 /nanning_agents_mvp/ 转发到本机 8016 端口
location /nanning_agents_mvp/ {
    proxy_pass         http://127.0.0.1:8016/;
    proxy_http_version 1.1;

    # WebSocket 支持（聊天流式输出可能需要）
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";

    # 标准反向代理头
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # 文件上传大小（AI功能可能需要上传文件）
    client_max_body_size 50m;

    # 超时设置（AI 回复可能较慢）
    proxy_read_timeout    300s;
    proxy_connect_timeout  60s;
    proxy_send_timeout    300s;
}
