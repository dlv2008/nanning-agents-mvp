name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run automated tests
      run: npm test
      env:
        NODE_ENV: test
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to Cloud Server via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SERVER_HOST }}     # e.g., www.trendbot.cn
        username: ${{ secrets.SERVER_USER }} # e.g., root or dlv
        password: ${{ secrets.SERVER_PASSWORD }} # or use key: ${{ secrets.SERVER_SSH_KEY }}
        port: 22
        script: |
          cd /path/to/your/nanning_agents_mvp
          git pull origin main
          npm install --production
          # 如果使用 pm2 进行重启:
          # pm2 restart server
          # 如果未来使用 docker (阶段三), 在这里执行 docker-compose pull && docker-compose up -d
