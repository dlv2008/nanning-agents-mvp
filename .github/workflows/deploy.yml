name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run automated tests
      run: npm test
      env:
        NODE_ENV: test
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_PORT: ${{ secrets.DB_PORT }}
        DB_NAME: ${{ secrets.DB_NAME }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to Cloud Server via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SERVER_HOST }}     # e.g., www.trendbot.cn
        username: ${{ secrets.SERVER_USER }} # e.g., root or dlv
        key: ${{ secrets.SERVER_SSH_KEY }}   # 使用 SSH 密钥进行认证
        port: ${{ secrets.SERVER_PORT }}
        script: |
          # 动态尝试多个 Github 加速节点，避免单一节点挂掉
          PROXY_URLS=(
            "https://kkgithub.com/${{ github.repository }}.git"
            "https://github.com/${{ github.repository }}.git"
          )

          # 1. 检查根目录是否是一个正常的 Git 仓库，如果不是则清除
          if [ ! -d "/home/dlv/nanning_agents_mvp/.git" ]; then
            echo "目标目录不存在或非有效仓库，即将重新克隆..."
            rm -rf /home/dlv/nanning_agents_mvp || true
            # 尝试依次用不同源克隆
            for URL in "${PROXY_URLS[@]}"; do
              echo "正在尝试克隆: $URL"
              if git clone $URL /home/dlv/nanning_agents_mvp; then
                cd /home/dlv/nanning_agents_mvp
                git remote set-url origin $URL
                SUCCESS=1
                break
              fi
            done
          else
            cd /home/dlv/nanning_agents_mvp
            # 尝试依次用不同源拉取最新代码
            for URL in "${PROXY_URLS[@]}"; do
              echo "正在尝试拉取: $URL"
              git remote set-url origin $URL
              if git pull origin main; then
                SUCCESS=1
                break
              fi
            done
          fi

          if [ "$SUCCESS" != "1" ]; then
            echo "所有 GitHub 节点拉取代码均失败，请检查服务器网络！"
            exit 1
          fi

          cd /home/dlv/nanning_agents_mvp
          
          # 3. 给自动化脚本添加执行权限
          chmod +x deploy/run_server.sh
          
          # 4. 调用自动化脚本并注入全量运行时环境变量
          # 我们不再需要在远程服务器维护 .env，GitHub Secret 会直接注入到内存
          PORT=8016 \
          NODE_ENV=production \
          DB_HOST=${{ secrets.DB_HOST }} \
          DB_PORT=${{ secrets.DB_PORT }} \
          DB_NAME=${{ secrets.DB_NAME }} \
          DB_USER=${{ secrets.DB_USER }} \
          DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
          SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
          LLM_API_URL=${{ secrets.LLM_API_URL }} \
          LLM_API_KEY=${{ secrets.LLM_API_KEY }} \
          LLM_MODEL_NAME=${{ secrets.LLM_MODEL_NAME }} \
          ./deploy/run_server.sh
