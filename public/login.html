<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 国能南宁AI智能体平台</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header class="header">
        <div class="header-logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                </svg>
            </div>
            <div>
                <h1>国能南宁AI智能体平台</h1>
                <div class="subtitle">AI 办公助手</div>
            </div>
        </div>
    </header>

    <main class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2 id="auth-title">欢迎登录</h2>
                <p id="auth-subtitle">请使用您的邮箱和密码进行登录</p>
            </div>

            <form id="auth-form">
                <div class="form-group">
                    <label for="email">邮箱地址</label>
                    <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn" id="submit-btn">立即登录</button>
            </form>

            <div class="error-msg" id="error-msg"></div>

            <div class="toggle-auth">
                <span id="toggle-text">还没有账号？</span>
                <a href="#" id="toggle-link">立即注册</a>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase-config.js"></script>
    <script src="./js/auth.js"></script>
</body>

</html>
