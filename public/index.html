<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国能南宁AI智能体平台</title>
  <meta name="description" content="国能南宁发电有限公司AI智能体集成平台，提供违章考核、人资绩效、任务分解、合规审核、生产经营等智能服务">

  <script src="./js/supabase-config.js"></script>
  <script src="./js/ui.js"></script>
</head>

<body>
  <!-- Header -->

    <a href="./index.html" class="header-logo">

        </svg>
      </div>
      <div>
        <h1>国能南宁AI智能体平台</h1>
        <div class="subtitle">AI 办公助手</div>
      </div>
    </a>
    <button class="mobile-menu-btn" id="mobile-menu-btn" onclick="toggleMobileMenu()">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>
    <nav class="header-nav" id="header-nav">
      <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()" title="切换主题">
        <svg id="theme-icon-sun" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          style="display:none">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
        <svg id="theme-icon-moon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>
      <a href="./index.html" class="nav-btn active" id="nav-home">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span class="nav-text">门户首页</span>
      </a>
      <a href="./config.html" class="nav-btn" id="nav-config">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
        <span class="nav-text">系统配置</span>
      </a>
      <button class="nav-btn danger-btn" onclick="logout()">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        <span class="nav-text">退出</span>
      </button>
    </nav>
  </header>

  <!-- Portal Content -->
  <main class="portal-container">
    <section class="portal-hero">
      <h2>AI智能体集成服务平台</h2>
      <p>基于大模型技术，为电力企业提供智能化管理工具。覆盖安全管理、人力资源、行政管理、合规审核、生产经营五大业务场景。</p>
    </section>

    <section class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <div class="stat-icon blue">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2" />
            <line x1="8" y1="21" x2="16" y2="21" />
            <line x1="12" y1="17" x2="12" y2="21" />
          </svg>
        </div>
        <div>
          <div class="stat-value" id="stat-agents">-</div>
          <div class="stat-label">在线智能体</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
          </svg>
        </div>
        <div>
          <div class="stat-value" id="stat-sessions">-</div>
          <div class="stat-label">今日会话</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon purple">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
          </svg>
        </div>
        <div>
          <div class="stat-value" id="stat-messages">-</div>
          <div class="stat-label">今日消息</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon orange">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" />
            <polyline points="13 2 13 9 20 9" />
          </svg>
        </div>
        <div>
          <div class="stat-value" id="stat-files">-</div>
          <div class="stat-label">处理文件</div>
        </div>
      </div>
    </section>

    <section class="agents-section">
      <h3>智能体服务</h3>
      <div class="agents-grid" id="agents-grid">
        <!-- Dynamically loaded -->
      </div>
    </section>
  </main>

  <script>
    const API_BASE = window.location.pathname.includes('/nanning_agents_mvp') ? '/nanning_agents_mvp' : '';

    async function apiFetch(url, options = {}) {
      const { data: { session } } = await window.supabase.auth.getSession();
      const headers = {
        ...options.headers,
        'Authorization': `Bearer ${session?.access_token}`
      };
      return fetch(url, { ...options, headers });
    }

    async function loadDashboard() {
      try {
        const res = await apiFetch(`${API_BASE}/api/dashboard`);
        const data = await res.json();
        if (data.success) {
          document.getElementById('stat-agents').textContent = data.data.agentCount;
          document.getElementById('stat-sessions').textContent = data.data.todaySessions;
          document.getElementById('stat-messages').textContent = data.data.todayMessages;
          document.getElementById('stat-files').textContent = data.data.totalFiles;
        }
      } catch (err) {
        console.error('加载统计数据失败:', err);
      }
    }

    async function loadAgents() {
      try {
        const res = await apiFetch(`${API_BASE}/api/agents`);
        const data = await res.json();
        if (data.success) {
          renderAgents(data.data);
        }
      } catch (err) {
        console.error('加载智能体失败:', err);
        document.getElementById('agents-grid').innerHTML = '<p style="color: var(--danger)">加载失败，请检查服务器连接</p>';
      }
    }

    function renderAgents(agents) {
      const grid = document.getElementById('agents-grid');
      grid.innerHTML = agents.map(agent => `
        <div class="agent-card" onclick="openAgent('${agent.code}')">
          <div class="agent-card-header">
            <div class="agent-card-icon">
              ${agent.icon}
            </div>
            <div>
              <div class="agent-card-title">${agent.name}</div>
              <div class="agent-card-category">${agent.category}</div>
            </div>
          </div>
          <div class="agent-card-desc">${agent.description}</div>
          <div class="agent-card-footer">
            <div class="agent-status">在线就绪</div>
            <button class="agent-enter-btn" onclick="event.stopPropagation(); openAgent('${agent.code}')">
              进入对话 →
            </button>
          </div>
        </div>
      `).join('');
    }

    function openAgent(code) {
      window.location.href = `./chat.html?agent=${code}`;
    }

    async function init() {
      const { data: { session } } = await window.supabase.auth.getSession();
      if (!session) {
        window.location.href = './login.html';
        return;
      }
      loadDashboard();
      loadAgents();
    }

    async function logout() {
      await window.supabase.auth.signOut();
      window.location.href = './login.html';
    }

    init();
  </script>

</body>

</html>
